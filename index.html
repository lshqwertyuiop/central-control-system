<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>型材立库中控系统</title>
  <link rel="stylesheet" href="antd.min.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* ── Sider / Header ── */
    .sider-logo {
      display: flex; align-items: center; gap: 9px;
      padding: 0 18px; height: 52px; border-bottom: 1px solid #f0f0f0;
      background: #fff; flex-shrink: 0; overflow: hidden;
    }
    .sider-logo-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: #E85B00; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sider-logo-icon span { color: #fff; font-weight: 900; font-size: 15px; line-height:1; }
    .sider-logo-text { font-weight: 700; font-size: 13px; color: #1a1a2e; white-space: nowrap; letter-spacing: .4px; }
    .sider-logo-text small { font-weight: 400; font-size: 11px; color: #999; display:block; line-height:1.2; }

    .header-bar {
      background: #fff; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #f0f0f0; height: 52px; flex-shrink: 0;
    }

    /* ── Warehouse Grid ── */
    .wh-outer { display: flex; gap: 16px; align-items: flex-start; }
    .wh-wrap  { overflow: auto; flex: 1; padding: 4px 0; }
    .wh-areas { display: flex; gap: 16px; align-items: flex-start; width: max-content; }
    .wh-area-card {
      border: 1px solid #eceff3; border-radius: 12px; padding: 14px;
      background: #fff;
      box-shadow: 0 1px 3px rgba(20, 40, 80, .04);
    }
    .wh-area-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px; margin-bottom: 10px;
    }
    .wh-area-title { font-size: 14px; font-weight: 700; color: #1a1a2e; }
    .wh-area-meta { font-size: 12px; color: #8c8c8c; }
    .wh-axis { display: flex; align-items: center; margin-bottom: 6px; }
    .wh-axis-spacer { width: 44px; flex-shrink: 0; }
    .wh-axis-cols { display: flex; gap: 4px; padding-left: 2px; }
    .wh-axis-label {
      width: 36px; text-align: center; font-size: 11px;
      color: #8c8c8c; flex-shrink: 0;
    }
    .wh-grid  { display: flex; flex-direction: column; gap: 4px; width: max-content; }
    .wh-row   { display: flex; align-items: center; gap: 4px; }
    .wh-row-label {
      width: 44px; text-align: left; padding-left: 6px;
      font-size: 11px; color: #8c8c8c; flex-shrink: 0;
    }
    .wh-row-cells {
      display: flex; gap: 6px; padding: 4px 0;
    }
    .wh-cell {
      width: 34px; height: 24px; border-radius: 6px; cursor: pointer;
      border: 1px solid #eef1f5; background: #f6f8fb;
      transition: transform .12s, box-shadow .12s, background .12s;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .wh-cell-slot {
      width: 34px; height: 24px; flex-shrink: 0;
      pointer-events: none;
    }
    .wh-cell::after { content:''; width:8px; height:8px; border-radius:50%; background:transparent; }
    .wh-cell:hover { transform: translateY(-1px); z-index: 10; box-shadow: 0 2px 6px rgba(0,0,0,.10); }

    .s-empty    { background: #fff; }
    .s-empty::after    { background:#fff; border:1.5px solid #d0d5dd; }
    .s-occupied { background: rgba(22,119,255,.08); border-color: rgba(22,119,255,.18); }
    .s-occupied::after { background:#1677ff; }
    .s-abnormal { background: rgba(255,77,79,.10); border-color: rgba(255,77,79,.22); }
    .s-abnormal::after { background:#ff4d4f; }
    .s-locked   { background: rgba(250,173,20,.12); border-color: rgba(250,173,20,.28); }
    .s-locked::after   { background:#faad14; }
    .s-disabled { background: #f0f0f0; border-color:#e3e3e3; }
    .s-disabled::after { background:#cfcfcf; }
    .s-selected { border-color: #E85B00 !important;
                  box-shadow: 0 0 0 2px rgba(232,91,0,.25) !important; }
    .s-dimmed   { opacity: .25; }
    @keyframes cellPulse { 0%,100%{opacity:1} 50%{opacity:.55} }

    /* ── Legend (vertical, right side) ── */
    .wh-legend {
      display: flex; flex-direction: column; gap: 10px;
      padding: 10px 12px; background: #fafafa;
      border: 1px solid #f0f0f0; border-radius: 6px;
      flex-shrink: 0; align-self: flex-start;
    }
    .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; color:#555; white-space:nowrap; }
    .legend-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .legend-dot.ld-empty    { background:#fff; border:1.5px solid #d0d5dd; }
    .legend-dot.ld-occupied { background:#1677ff; }
    .legend-dot.ld-abnormal { background:#ff4d4f; }
    .legend-dot.ld-locked   { background:#faad14; }
    .legend-dot.ld-disabled { background:#d9d9d9; }

    /* ── Layout tweaks ── */
    .page-content { padding: 16px; min-height: 100%; }
    .stat-card { text-align: center; }
    .conn-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
    .conn-ok  { background:#52c41a; }
    .conn-err { background:#ff4d4f; animation:cellPulse 1s infinite; }
    .section-gap { margin-bottom: 14px; }

    /* ── 加工任务 实时看板 ── */
    .kb-mat-id { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-weight: 700; font-size: 12px; color: #111827; }
    .kb-badge {
      display: inline-flex; align-items: center; border-radius: 5px;
      padding: 1px 9px; font-size: 12px; font-weight: 600;
      border: 1px solid #e5e7eb; background: #f3f4f6; color: #374151; line-height: 20px;
    }
    .kb-badge-editable { cursor: pointer; border-color: #91caff; background: #eff6ff; color: #1677ff; transition: background .15s; }
    .kb-badge-editable:hover { background: #dbeafe; }
    .kb-badge-loading { border-style: dashed; border-color: #a5b4fc; color: #6366f1; background: #f5f3ff; }
    .kb-badge-old { text-decoration: line-through; color: #9ca3af; background: #f3f4f6; font-size: 11px; }
    .kb-legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .kb-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #8c8c8c; }
    .kb-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .kb-live-dot { width: 8px; height: 8px; border-radius: 50%; background: #52c41a; animation: cellPulse 1.6s infinite; flex-shrink: 0; }
    .kb-table .kb-row-pushfail > td { background: #fff1f0 !important; }
    .kb-drag-handle { cursor: grab; color:#bfbfbf; font-size:16px; line-height:1; user-select:none; display:inline-block; padding:0 2px; }
    .kb-drag-handle:hover { color:#fa8c16; }
    .kb-drag-handle:active { cursor: grabbing; }
    .kb-table .kb-row-dragover > td { border-top: 2px solid #fa8c16 !important; background:#fff7e6; }
    .sched-gantt { border:1px solid #f0f0f0; border-radius:6px; background:#fafbfc; padding:6px 4px; }
    .kb-prog { display:flex; flex-direction:column; gap:3px; }
    .kb-prog-bar { display:flex; gap:3px; }
    .kb-prog-seg { width:14px; height:6px; border-radius:3px; background:#e5e7eb; display:inline-block; }
    .kb-prog-done { background:#52c41a; }
    .kb-prog-cur  { background:#1677ff; box-shadow:0 0 0 2px rgba(22,119,255,.18); animation:cellPulse 1.6s infinite; }
    .kb-prog-pend { background:#e5e7eb; }
    .kb-prog-label { font-size:11px; color:#6b7280; white-space:nowrap; }

    /* Light sider override */
    .ant-layout-sider { border-right: 1px solid #f0f0f0 !important; }
    .ant-layout-sider-trigger { border-top: 1px solid #f0f0f0 !important; color: #666 !important; background: #fff !important; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="react.min.js"></script>
<script src="react-dom.min.js"></script>
<script src="dayjs.min.js"></script>
<script src="antd.min.js"></script>
<script src="加工任务_假数据.js"></script>
<script src="排产_输入数据.js"></script>
<script src="排产_算法.js"></script>
<script src="data.js"></script>
<script>
'use strict';
const { useState, useEffect, useMemo, useCallback, useRef } = React;
const {
  Layout, Menu, Table, Button, Tag, Form, Select, Input,
  Space, Card, Row, Col, Badge, Modal, Tooltip, Divider,
  Statistic, Alert, Typography, Breadcrumb, message,
  Popconfirm, Switch, Tabs, Timeline, Descriptions, ConfigProvider, App,
  InputNumber, Progress, Steps, Spin, Popover, Radio, Drawer, DatePicker, Checkbox, Calendar, Upload
} = antd;
const { Header, Sider, Content } = Layout;
const { Title, Text, Paragraph } = Typography;
const { Option } = Select;

/* ═══════════════════════ MOCK DATA（已抽离至 data.js，见同目录） ═══════════════════════ */

/* ═══════════════════════ WAREHOUSE GRID ═══════════════════════ */
const STATUS_CFG = {
  empty:   {label:'空货位', cls:'ld-empty',    bg:'#fff'},
  occupied:{label:'有货',   cls:'ld-occupied', bg:'#1677ff'},
  abnormal:{label:'异常',   cls:'ld-abnormal', bg:'#ff4d4f'},
  disabled:{label:'禁用',   cls:'ld-disabled', bg:'#d9d9d9'},
  locked:  {label:'锁定',   cls:'ld-locked',   bg:'#faad14'},
};

const CellTooltip = ({cell}) => React.createElement('div', {style:{fontSize:12}},
  React.createElement('div', null, `库位: ${cell.binNo}`),
  React.createElement('div', null, `目标库位: ${cell.targetBinNo||'待分配'}`),
  React.createElement('div', null, `分区: ${cell.areaName}`),
  cell.profileType && React.createElement('div', null, `规格: ${cell.profileType}`),
  cell.material && React.createElement('div', null, `材质: ${cell.material}`),
  cell.shipNo && React.createElement('div', null, `船号: ${cell.shipNo}`),
  cell.blockNo && React.createElement('div', null, `分段: ${cell.blockNo}`),
  cell.length && React.createElement('div', null, `长度: ${cell.length}mm`),
  React.createElement('div', null, `状态: ${STATUS_CFG[cell.status]?.label||cell.status}`),
);

const WarehouseGrid = ({data, selected, onSelect, matchBins}) => {
  const hasFilter = matchBins && matchBins.size > 0;
  const legend = React.createElement('div', {className:'wh-legend'},
    Object.entries(STATUS_CFG).map(([k,v]) =>
      React.createElement('div', {key:k, className:'legend-item'},
        React.createElement('div', {className:`legend-dot ${v.cls}`}),
        React.createElement('span', null, v.label),
      )
    )
  );
  const grid = React.createElement('div', {className:'wh-wrap'},
    React.createElement('div', {className:'wh-areas'},
      data.map((area)=>
        React.createElement('div',{key:area.key,className:'wh-area-card'},
          React.createElement('div',{className:'wh-area-head'},
            React.createElement('div',{className:'wh-area-title'},area.name),
            React.createElement('div',{className:'wh-area-meta'},`${area.totalBins} 库位`)
          ),
          React.createElement('div',{className:'wh-axis'},
            React.createElement('div',{className:'wh-axis-spacer'}),
            React.createElement('div',{className:'wh-axis-cols'},
              area.colLabels.map((label)=>
                React.createElement('div',{key:label,className:'wh-axis-label'},label)
              )
            )
          ),
          React.createElement('div', {className:'wh-grid'},
            area.rows.map((row,ri)=>
              React.createElement('div',{key:`${area.key}-${ri}`,className:'wh-row'},
                React.createElement('div',{className:'wh-row-label'},`第${area.levels - ri}层`),
                React.createElement('div',{className:'wh-row-cells'},
                  row.map((cell,ci)=>{
                    if (!cell) {
                      return React.createElement('div', {
                        key:ci,
                        className:'wh-cell-slot',
                      });
                    }
                    const isSel = selected?.id === cell.id;
                    const isDimmed = hasFilter && !matchBins.has(cell.binNo) && !isSel;
                    let cls = `wh-cell s-${cell.status}`;
                    if (isSel) cls += ' s-selected';
                    if (isDimmed) cls += ' s-dimmed';
                    return React.createElement(Tooltip, {
                      key:ci,
                      title: React.createElement(CellTooltip, {cell}),
                      placement:'top',
                      mouseEnterDelay:0.1,
                    },
                      React.createElement('div', {
                        className: cls,
                        onClick: () => onSelect(cell),
                      })
                    );
                  })
                )
              )
            )
          )
        )
      )
    )
  );
  return React.createElement('div', {className:'wh-outer'}, grid, legend);
};

const InventoryDashboard = ({gridData, inventoryData}) => {
  const [selected, setSelected] = useState(null);
  const [matchBins, setMatchBins] = useState(new Set());
  const [filteredData, setFilteredData] = useState(inventoryData);
  const [tableData, setTableData] = useState(inventoryData);
  const [activeAreaKey, setActiveAreaKey] = useState(null);
  const [form] = Form.useForm();
  const [editOpen, setEditOpen] = useState(false);
  const [editRow, setEditRow] = useState(null);
  const [editFormData, setEditFormData] = useState({});
  const {message:msg} = App.useApp();

  const allCells = useMemo(()=>flattenWarehouseAreas(gridData),[gridData]);
  const visibleAreas = useMemo(
    ()=> activeAreaKey ? gridData.filter(area => area.key === activeAreaKey) : gridData,
    [gridData, activeAreaKey]
  );
  const stats = useMemo(()=>({
    total: allCells.length,
    occupied: allCells.filter(c=>c.status==='occupied').length,
    empty: allCells.filter(c=>c.status==='empty').length,
    locked: allCells.filter(c=>c.status==='locked').length,
    abnormal: allCells.filter(c=>c.status==='abnormal').length,
    disabled: allCells.filter(c=>c.status==='disabled').length,
    inUse: allCells.filter(c=>['occupied','locked','abnormal'].includes(c.status)).length,
  }),[allCells]);

  const handleCellClick = (cell) => {
    if (selected?.id === cell.id) {
      setSelected(null);
      setTableData(filteredData);
    } else {
      setSelected(cell);
      setTableData(filteredData.filter(r=>r.binNo===cell.binNo));
    }
  };

  const handleSearch = () => {
    const v = form.getFieldsValue();
    let res = inventoryData;
    if (v.areaKey)     res = res.filter(r=>r.areaKey===v.areaKey);
    if (v.profileType) res = res.filter(r=>r.profileType===v.profileType);
    if (v.material)    res = res.filter(r=>r.material===v.material);
    if (v.shipNo)      res = res.filter(r=>r.shipNo===v.shipNo);
    if (v.blockNo)     res = res.filter(r=>r.blockNo===v.blockNo);
    setFilteredData(res);
    setTableData(res);
    setMatchBins(new Set(res.map(r=>r.binNo)));
    setActiveAreaKey(v.areaKey || null);
    setSelected(null);
  };

  const handleReset = () => {
    form.resetFields();
    setFilteredData(inventoryData);
    setTableData(inventoryData);
    setMatchBins(new Set());
    setActiveAreaKey(null);
    setSelected(null);
  };

  const EDIT_FIELDS = [
    ['库位编码','binNo'],['型材编码','profileId'],['船号','shipNo'],
    ['分段号','blockNo'],['材质','material'],['规格','profileType'],
    ['版图号','nestingLayoutNo'],['长度(mm)','length'],
    ['重量(kg)','weight'],['炉批号','heatNumber'],['计划日期','planDate'],
  ];

  const canEditBin = (status) => ['occupied','empty'].includes(status);

  const openEditModal = (row) => {
    const initialData = {};
    EDIT_FIELDS.forEach(([_, fieldName]) => {
      initialData[fieldName] = row[fieldName] || '';
    });
    initialData.reason = '';
    setEditRow(row);
    setEditFormData(initialData);
    setEditOpen(true);
  };

  const handleEditSave = () => {
    msg.success(`库位 ${editRow.binNo} 修改成功`);
    setEditOpen(false);
    setEditRow(null);
    setEditFormData({});
  };

  const invCols = [
    {title:'库位号', dataIndex:'binNo', width:110},
    {title:'目标库位', dataIndex:'targetBinNo', width:110, render:v=>v||'待分配'},
    {title:'型材唯一编码', dataIndex:'profileId', width:155, ellipsis:true},
    {title:'船号', dataIndex:'shipNo', width:100},
    {title:'分段号', dataIndex:'blockNo', width:100},
    {title:'程序号', dataIndex:'programNo', width:80},
    {title:'型材规格', dataIndex:'profileType', width:150},
    {title:'材质', dataIndex:'material', width:80},
    {title:'长度(mm)', dataIndex:'length', width:100},
    {title:'炉批号', dataIndex:'heatNumber', width:120},
    {title:'操作', key:'op', width:80, fixed:'right',
      render:(_,r)=>React.createElement(Button,{
        size:'small',type:'link',
        disabled:!canEditBin(r.binStatus),
        onClick:()=>openEditModal(r)
      },'修改')
    },
  ];

  return React.createElement('div', {className:'page-content'},
    React.createElement(Row, {gutter:12, className:'section-gap'},
      [
        {label:'总货位', val:stats.total, color:'#1677ff'},
        {label:'有货', val:stats.occupied, color:'#52c41a'},
        {label:'空货位', val:stats.empty, color:'#8c8c8c'},
        {label:'锁定', val:stats.locked, color:'#faad14'},
        {label:'异常', val:stats.abnormal, color:'#ff4d4f'},
        {label:'禁用', val:stats.disabled, color:'#595959'},
        {label:'使用率', val:`${(stats.inUse/stats.total*100).toFixed(1)}%`, color:'#722ed1'},
      ].map((s,i)=>
        React.createElement(Col,{key:i,xs:12,sm:8,md:8,lg:6,xl:4,xxl:3},
          React.createElement(Card,{size:'small',className:'stat-card',bodyStyle:{padding:'10px 12px'}},
            React.createElement(Statistic,{
              title:s.label, value:s.val,
              valueStyle:{color:s.color, fontSize:20, fontWeight:700}
            })
          )
        )
      )
    ),

    React.createElement(Card,{size:'small',className:'section-gap'},
      React.createElement(Form,{form, layout:'inline'},
        React.createElement(Form.Item,{name:'areaKey',label:'区域',style:{marginBottom:0}},
          React.createElement(Select,{placeholder:'全部',allowClear:true,style:{width:120}},
            AREA_CONFIGS.map(area=>React.createElement(Option,{key:area.key,value:area.key},area.name))
          )
        ),
        React.createElement(Form.Item,{name:'profileType',label:'规格',style:{marginBottom:0}},
          React.createElement(Select,{placeholder:'全部',allowClear:true,style:{width:160}},
            SPEC_LIST.map(v=>React.createElement(Option,{key:v,value:v},v))
          )
        ),
        React.createElement(Form.Item,{name:'material',label:'材质',style:{marginBottom:0}},
          React.createElement(Select,{placeholder:'全部',allowClear:true,style:{width:110}},
            MAT_LIST.map(v=>React.createElement(Option,{key:v,value:v},v))
          )
        ),
        React.createElement(Form.Item,{name:'shipNo',label:'船号',style:{marginBottom:0}},
          React.createElement(Select,{placeholder:'全部',allowClear:true,style:{width:120}},
            SHIP_LIST.map(v=>React.createElement(Option,{key:v,value:v},v))
          )
        ),
        React.createElement(Form.Item,{name:'blockNo',label:'分段号',style:{marginBottom:0}},
          React.createElement(Select,{placeholder:'全部',allowClear:true,style:{width:120}},
            BLOCK_LIST.map(v=>React.createElement(Option,{key:v,value:v},v))
          )
        ),
        React.createElement(Form.Item,{style:{marginBottom:0}},
          React.createElement(Space,null,
            React.createElement(Button,{type:'primary',onClick:handleSearch},'查询'),
            React.createElement(Button,{onClick:handleReset},'重置'),
          )
        ),
        React.createElement(Form.Item,{style:{marginBottom:0, marginLeft:'auto'}},
          React.createElement(Space,{size:10},
            React.createElement(Text,{type:'secondary',style:{fontSize:12}},'数据更新于 2026-05-17 14:32:15'),
            React.createElement(Button,{size:'small',type:'link',style:{padding:0}},'立即刷新'),
          )
        ),
      )
    ),

    React.createElement(Card,{
      size:'small',
      title:'货位看板',
      className:'section-gap',
      extra: React.createElement(Space,null,
        activeAreaKey && React.createElement(Tag,{color:'geekblue'},AREA_CONFIGS.find(item=>item.key===activeAreaKey)?.name),
        selected && React.createElement(Tag,{color:'blue',closable:true,onClose:()=>{setSelected(null);setTableData(filteredData);}},
          `已选中: ${selected.binNo}`
        ),
        React.createElement(Text,{type:'secondary',style:{fontSize:12}},
          '1号分区 95 库位 / 2号分区 136 库位 / 3号分区 136 库位'
        ),
      ),
    },
      React.createElement(WarehouseGrid,{data:visibleAreas, selected, onSelect:handleCellClick, matchBins})
    ),

    React.createElement(Card,{
      size:'small',
      title: React.createElement(Space,null,'库存明细',
        selected&&React.createElement(Tag,{color:'blue'},`库位: ${selected.binNo}`)
      ),
      extra: React.createElement(Space,null,
        React.createElement(Button,{size:'small'},'导出 Excel'),
        React.createElement(Button,{size:'small',type:'primary'},'批量导出'),
      ),
    },
      React.createElement(Table,{
        columns:invCols,
        dataSource:tableData,
        rowSelection:{type:'checkbox'},
        size:'small',
        scroll:{x:1210},
        pagination:{pageSize:8,showSizeChanger:true,showTotal:t=>`共 ${t} 条`},
      })
    ),

    React.createElement(Modal,{
      title: editRow?`修改库位 — ${editRow.binNo}`:'修改库位',
      open:editOpen, width:680,
      onOk:handleEditSave,
      onCancel:()=>{setEditOpen(false);setEditRow(null);setEditFormData({});},
      okText:'保存', cancelText:'取消',
      key:editRow?.binNo,
    },
      React.createElement(Alert,{
        type:'warning',showIcon:true,style:{marginBottom:14},
        message:'此操作将直接修改立库系统中该库位的型材绑定关系，请谨慎操作并填写修改原因。',
      }),
      React.createElement(Form,{layout:'vertical'},
        React.createElement(Row,{gutter:16},
          ...EDIT_FIELDS.map(([label,name])=>
            React.createElement(Col,{key:name,span:12},
              React.createElement(Form.Item,{label,name},
                React.createElement(Input,{
                  placeholder:`请输入${label}`,

    const blocker = tasks.find(t=>t.status==='ZONE_MATCH_FAILED' && (t.order??0)<(r.order??0));
    if (blocker) { msg.error(`前序任务 ${blocker.taskNo} 库区匹配异常，当前任务暂不可下发`); return; }
    setTasks(prev=>prev.map(t=>t.key===r.key?{...t,status:'WAIT'}:t));

    const norm = v => String(v ?? '').trim().toUpperCase();
    const program = v => norm(v).match(/(?:HC)?(PX|PY|PZ|PJ)/)?.[1] || norm(v);
    const matchedIndex = (planData || []).findIndex(p => p.planningStatus==='PLANNED'
      && norm(p.shipNo)===norm(row.shipNo)
      && norm(p.blockNo)===norm(row.blockNo)
      && program(p.programNo)===program(row.programNo));
    if (matchedIndex < 0) {
      msg.error(`任务 ${row.taskNo} 重新匹配失败，仍未找到对应排产结果`);
      return;
    }
    const matchedPlan = planData[matchedIndex];
    const zone = INB_ZONES[(matchedIndex + Number(matchedPlan.key || 0)) % INB_ZONES.length];
    setTasks(prev=>prev.map(t=>t.key===row.key?{...t,status:'NOT_STARTED',zone,
      zoneMatchStatus:'MATCHED',zoneMatchSource:'排产重试匹配',matchedPlanKey:matchedPlan.key}:t));
    msg.success(`任务 ${row.taskNo} 重新匹配成功，目标库区：${zone}`);
  };
  const saveManualZone = () => {
    if (!manualZone) { msg.warning('请选择目标库区'); return; }

      zoneMatchStatus:'MANUAL',zoneMatchSource:'人工指定'}:t));

    setZoneFixRow(null); setManualZone(undefined);

      msg.success(`任务 ${adv.row.taskNo} 已撤回，状态 → 未开始`);

        const idx = disp.findIndex(t=>t.key===adv.row.key);

const OutboundPage = () => {
  const { message: msg } = App.useApp();
  const [items, setItems] = useState(makeKanbanItems);
  const [pickerId, setPickerId] = useState(null);
  const [pkgFilter, setPkgFilter] = useState();          // 工单号筛选
  const [selectedRowKeys, setSelectedRowKeys] = useState([]);  // 多选
  const [detailOpen, setDetailOpen] = useState(false);   // 详情
  const [detailRow, setDetailRow] = useState(null);
  const [batchPickerOpen, setBatchPickerOpen] = useState(false);  // 批量改即将工位
  const [activeTab, setActiveTab] = useState('pending');          // 当前 Tab
  const [sourceFilter, setSourceFilter] = useState();           // 来源筛选
  const [dispatchMode, setDispatchMode] = useState('manual');   // manual | auto 下发模式
  const [newOrderOpen, setNewOrderOpen] = useState(false);      // 手动创建工单
  const [newOrderKeys, setNewOrderKeys] = useState([]);        // 新建工单：所选工单
  const [newOrderPkgFilter, setNewOrderPkgFilter] = useState(''); // 新建工单：工单号筛选
  const [orderForm] = Form.useForm();

  // 按 id 局部更新（始终用函数式 setState，避免实时推送与异步回调互相覆盖）
  const patch = (id, fields) =>
    setItems(prev => prev.map(it => it.id === id ? { ...it, ...fields } : it));
  const patchMany = (ids, fields) =>
    setItems(prev => prev.map(it => ids.includes(it.id) ? { ...it, ...fields } : it));

  // ── 实时状态推送（模拟）：每 4.5s 随机推进一个 pending 物料的状态 ──
  useEffect(() => {
    const timer = setInterval(() => {
      setItems(prev => {
        const pend = prev.filter(i => i.status !== '未叫料' && kbAllPushed(i));
        if (!pend.length) return prev;
        const target = kbRand(pend);
        const cfg = KB_LANES.find(l => l.id === target.lane);
        const idx = cfg.statuses.indexOf(target.status);
        if (idx >= 0 && idx < cfg.statuses.length - 1) {
          const ns = cfg.statuses[idx + 1];
          return prev.map(i => i.id === target.id ? { ...i, status: ns } : i);
        }
        return prev;
      });
    }, 4500);
    return () => clearInterval(timer);
  }, []);

  const itemsRef = useRef(items); itemsRef.current = items;
  const patchBoth = (id, fields) => {
    setItems(prev => prev.map(it => it.id===id ? { ...it, ...fields } : it));
    setDetailRow(prev => (prev && prev.id===id) ? { ...prev, ...fields } : prev);
  };
  // 待下发→已下发的流转：仅当仍在待下发且三推送全部成功(或无需推送)时才切换状态
  const settleDispatch = (id) => {
    const flip = (x) => (x && x.id===id && x.status==='未叫料' && kbPushOk(x.pushLib) && kbPushOk(x.pushSpray) && kbPushOk(x.pushCut)) ? { ...x, status:'已叫料' } : x;
    setItems(prev => prev.map(flip));
    setDetailRow(prev => flip(prev));
  };
  const PUSH_FAIL_RATE = 0.18;
  const needPush = (v) => v==='未推送' || v==='失败';   // 待(重)推
  // 顺序推送流水线：① 喷码 + 切割（加工文件）成功 → ② 立库（叫料/出库）；①失败则阻塞，不推立库
  const runPipeline = (id, done) => {
    const finish = (ok) => { if (done) done(ok); };
    const phase2 = () => {
      const c = itemsRef.current.find(x=>x.id===id);
      if (!c) return finish(false);
      if (!(kbPushOk(c.pushSpray) && kbPushOk(c.pushCut))) return finish(false);   // 喷码/切割未成功 → 阻塞
      if (c.pushLib==='无需推送' || !needPush(c.pushLib)) { settleDispatch(id); return finish(kbPushOk(c.pushLib)); }
      patchBoth(id, { pushLib:'推送中' });
      setTimeout(() => {
        const pl = Math.random()<PUSH_FAIL_RATE ? '失败' : '成功';
        patchBoth(id, { pushLib:pl });
        settleDispatch(id);
        finish(pl==='成功');
      }, 1000 + Math.random()*700);
    };
    const c0 = itemsRef.current.find(x=>x.id===id);
    if (!c0) return finish(false);
    const p1 = [];
    if (c0.pushSpray!=='无需推送' && needPush(c0.pushSpray)) p1.push('pushSpray');
    if (c0.pushCut!=='无需推送'   && needPush(c0.pushCut))   p1.push('pushCut');
    if (!p1.length) { phase2(); return; }
    patchBoth(id, Object.fromEntries(p1.map(k=>[k,'推送中'])));
    setTimeout(() => {
      const res = Object.fromEntries(p1.map(k=>[k, Math.random()<PUSH_FAIL_RATE ? '失败' : '成功']));
      patchBoth(id, res);
      if (p1.every(k=>res[k]==='成功')) phase2();
      else {
        // 喷码/切割失败 → 阻塞，不实际推立库；但立库置“失败”以提示整单受阻
        const lib = (itemsRef.current.find(x=>x.id===id)||{}).pushLib;

        finish(false);
      }
    }, 1000 + Math.random()*700);

  const pushSettle = (id) => runPipeline(id, null);
  // 重新推送（仅在详情触发）：重推该上位机成功后，按顺序继续后续推送并尝试流转
  const repushTarget = (item, pushKey, name) => {
    patchBoth(item.id, { [pushKey]:'推送中' });

      patchBoth(item.id, { [pushKey]:'成功' });
      msg.success(`${item.id} 已重新推送至${name}`);

  // 修改工位：未下发直接改（重置对应推送为未推送）；已下发为强制修改，需弹窗确认产线停止，改后重推对应上位机

  const doChange = (item, field, next) => {

      msg.success(`${item.id} ${meta.label} → ${next}（推送${pkLabel}重置为未推送）`);
      return;

    Modal.confirm({
      title: '请确认产线停止',
      content: `修改${meta.label}为 ${next} 将影响在产产线，请确认产线已停止后继续。`,
      okText: '已停止，确认修改', cancelText: '取消',
      onOk: () => {
        patchBoth(item.id, { [di]: next });
        msg.success(`${item.id} ${meta.label} → ${next}（强制修改），正在重新推送${pkLabel}`);

      if (!list.length) { msg.success('自动下发队列已全部完成'); return; }
      const [head, ...rest] = list;

const makeSchedPackages = (n=12) => Array.from({length:n}, (_,i)=>{
  const profileCount = rnd(8)+4;
  const stockReady = Math.max(0, profileCount - (Math.random()<0.45 ? rnd(4)+1 : 0));
  const profiles = Array.from({length:profileCount}, (_,j)=>({
    key:j+1, profileId:'P'+randId(), profileType:pick(SPEC_LIST),
    length:(rnd(8)+2)*1000, weight:+(Math.random()*800+120).toFixed(0),
    daoCi:pick(DAO_LIST), partsQty:rnd(20)+3, inStock: j < stockReady, cutTime: rnd(240)+60,
  }));
  const status = pick(['WAIT','SCHEDULED','SCHEDULED','CONFIRMED']);
  return {
    key:i+1, packageNo: PACKAGE_LIST[i] || ('PKG-'+padZ(i+1,3)),
    shipNo:pick(SHIP_LIST), blockNo:pick(BLOCK_LIST),
    profileCount, stockReady, profiles, planDate:'2026-06-09',
    shift: status==='WAIT' ? null : pick(['D','N']), status,

/* ═══════════════════════ PAGE: 生产计划 (重设计) ═══════════════════════ */
const PLAN_SOURCES = { MES:{label:'MES下发',color:'blue'}, LOCAL:{label:'创建',color:'green'} };
const normalizeProdDate = (value) => {
  const text = String(value || '').trim();
  if (!text) return '';
  const match = text.match(/\d{4}-\d{2}-\d{2}/);
  return match ? match[0] : text;
};
const PLAN_PROD_DATE_STORAGE_KEY = 'profile_plan_prod_dates';
const loadPlanProdDateStore = () => {
  try {
    return JSON.parse(localStorage.getItem(PLAN_PROD_DATE_STORAGE_KEY) || '{}') || {};
  } catch (e) {
    return {};
  }
};
const savePlanProdDateStore = (items) => {
  const store = {};
  (items || []).forEach(item => {
    const ds = normalizeProdDate(item.prodShift);
    if (ds) store[item.packageNo] = ds;
  });
  localStorage.setItem(PLAN_PROD_DATE_STORAGE_KEY, JSON.stringify(store));
};
const applyPlanProdDateStore = (items) => {
  const store = loadPlanProdDateStore();
  return (items || []).map(item => ({
    ...item,
    prodShift: Object.prototype.hasOwnProperty.call(store, item.packageNo)
      ? store[item.packageNo]
      : normalizeProdDate(item.prodShift),
  }));
};
const PLAN_PROGRESS_STATUS = {
  NOT_STARTED: { label:'未开始', color:'default' },
  PLANNED: { label:'完成', color:'success' },
  ABNORMAL: { label:'异常', color:'error' },
};
const calcPlanProgress = (items) => {
  const total = items.length;
  const abnormal = items.filter(item => item.planningStatus === 'ABNORMAL').length;
  const planned = items.filter(item => item.planningStatus === 'PLANNED').length;
  const started = items.filter(item => item.planningStatus && item.planningStatus !== 'NOT_STARTED').length;
  if (abnormal > 0) return { key:'ABNORMAL', done: started, total };
  if (planned === total && total > 0) return { key:'PLANNED', done: planned, total };
  if (started > 0) return { key:'IN_PROGRESS', done: started, total };
  return { key:'NOT_STARTED', done: 0, total };
};
const renderPlanProgress = (progress) => {
  const cfg = PLAN_PROGRESS_STATUS[progress.key] || PLAN_PROGRESS_STATUS.NOT_STARTED;
  return React.createElement(Tag, { color:cfg.color, style:{margin:0} }, `${cfg.label} ${progress.done}/${progress.total}`);
};
const buildPlanProdDateMap = (items) => {
  const grouped = {};
  (items || []).forEach(item => {
    const ds = normalizeProdDate(item.prodShift);
    if (!ds) return;
    const packageNo = item.packageNo;
    if (!grouped[ds]) grouped[ds] = {};
    if (!grouped[ds][packageNo]) {
      grouped[ds][packageNo] = {
        packageNo,
        shipNo:item.shipNo,
        blockNo:item.blockNo,
        programNo:item.programNo,
        source:item.source,
        prodShift:ds,
        materialCount:0,
        cutTime:0,
      };
    }
    grouped[ds][packageNo].materialCount += 1;
    grouped[ds][packageNo].cutTime += Number(item.cutTime || 0);
  });
  Object.keys(grouped).forEach(ds => { grouped[ds] = Object.values(grouped[ds]); });
  return grouped;
};
const renderDetailPlanningStatus = (status) => {
  const key = status === 'ABNORMAL' ? 'ABNORMAL' : (status === 'PLANNED' ? 'PLANNED' : 'NOT_STARTED');
  const cfg = PLAN_PROGRESS_STATUS[key] || PLAN_PROGRESS_STATUS.NOT_STARTED;
  return React.createElement(Tag, { color:cfg.color, style:{margin:0} }, cfg.label);
};

const downloadText = (filename, content, mime) => {
  const blob = new Blob(['﻿'+content], { type: mime || 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
};

/* ── 日志管理 ── */
const LOG_TYPES = ['操作日志','事件日志','性能日志','接口日志'];
const LOG_LEVELS = { DEBUG:'default', INFO:'blue', WARN:'gold', ERROR:'red', FATAL:'magenta' };
const LOG_SAMPLES = {
  '操作日志':['用户登录系统','修改用户信息','撤回入库任务','批量设置计划日期','启用班次 双班16h'],
  '事件日志':['工单开始加工','工单加工状态切换 出库→喷码','工单分拣完成','工单结束'],
  '性能日志':['页面加载耗时 320ms','数据查询耗时 1.2s','CPU 占用 62%','内存占用 71%','磁盘I/O 偏高'],
  '接口日志':['调用 WMS 出库接口 成功','喷码上位机心跳超时','切割上位机回传完成','PLC 接口调用 成功'],
};
const makeLogs = (n=60) => Array.from({length:n},(_,i)=>{
  const type = pick(LOG_TYPES);
  const lv = pick(['DEBUG','INFO','INFO','INFO','WARN','ERROR','FATAL']);
  return { key:i+1, log_id:9000+i, type, level:lv, content:pick(LOG_SAMPLES[type]),
    source:type==='接口日志'?pick(['WMS','喷码上位机','切割上位机','PLC']):`操作员${rnd(9)+1}`,
    time:`2026-06-0${1+(i%9)} ${padZ(8+(i%12))}:${padZ((i*7)%60)}:${padZ((i*13)%60)}` };
});
const LogPage = () => {
  const { message:msg } = App.useApp();
  const [list, setList] = useState(makeLogs);
  const [type, setType] = useState();
  const [level, setLevel] = useState();
  const [kw, setKw] = useState('');
  const [sel, setSel] = useState([]);
  const [cleanOpen, setCleanOpen] = useState(false);
  const [keepDays, setKeepDays] = useState(30);

  const filtered = list.filter(l =>
    (!type || l.type===type) && (!level || l.level===level) &&
    (!kw || l.content.includes(kw) || String(l.source).includes(kw)));

  const exportFile = (fmt) => {
    if (!filtered.length) { msg.warning('当前无日志可导出'); return; }
    const head = ['时间','类型','等级','内容','来源'];
    if (fmt==='txt') {
      const txt = filtered.map(l=>`[${l.time}] ${l.level} ${l.type} | ${l.content} | ${l.source}`).join('\n');
      downloadText('日志导出.txt', txt);
    } else {
      const csv = [head.join(','), ...filtered.map(l=>[l.time,l.type,l.level,l.content,l.source].join(','))].join('\n');
      downloadText('日志导出.csv', csv, 'text/csv;charset=utf-8');
    }
    msg.success(`已导出 ${filtered.length} 条日志（${fmt.toUpperCase()}）`);
  };
  const delSel = () => { setList(p=>p.filter(l=>!sel.includes(l.key))); msg.success(`已删除 ${sel.length} 条日志`); setSel([]); };

  const cols = [
    { title:'时间', dataIndex:'time', width:170 },
    { title:'类型', dataIndex:'type', width:100, render:v=>React.createElement(Tag,null,v) },
    { title:'等级', dataIndex:'level', width:90, render:v=>React.createElement(Tag,{color:LOG_LEVELS[v]},v) },
    { title:'内容', dataIndex:'content', ellipsis:true },
    { title:'来源/操作人', dataIndex:'source', width:130 },
  ];

  return React.createElement('div',{className:'page-content'},
    React.createElement(Card,{size:'small',title:'日志管理'},
      React.createElement('div',{style:{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap',alignItems:'center'}},
        React.createElement(Select,{placeholder:'日志类型',allowClear:true,style:{width:130},value:type,onChange:setType,
          options:LOG_TYPES.map(t=>({value:t,label:t}))}),
        React.createElement(Select,{placeholder:'日志等级',allowClear:true,style:{width:120},value:level,onChange:setLevel,
          options:Object.keys(LOG_LEVELS).map(l=>({value:l,label:l}))}),
        React.createElement(Input,{placeholder:'内容/来源关键字',allowClear:true,style:{width:200},value:kw,onChange:e=>setKw(e.target.value)}),
        React.createElement('div',{style:{flex:1}}),
        sel.length>0 && React.createElement(Popconfirm,{title:`确认删除选中的 ${sel.length} 条日志？`,okText:'删除',cancelText:'取消',onConfirm:delSel},
          React.createElement(Button,{danger:true,size:'small'},`手动删除(${sel.length})`)),
        React.createElement(Button,{size:'small',onClick:()=>exportFile('txt')},'导出 TXT'),
        React.createElement(Button,{size:'small',onClick:()=>exportFile('excel')},'导出 EXCEL'),
        React.createElement(Button,{size:'small',onClick:()=>setCleanOpen(true)},'自动清理设置'),
      ),
      React.createElement(Table,{columns:cols,dataSource:filtered,rowKey:'key',size:'small',scroll:{x:760},
        rowSelection:{selectedRowKeys:sel,onChange:setSel},
        pagination:{pageSize:10,showTotal:t=>`共 ${t} 条日志`}})
    ),
    React.createElement(Modal,{title:'日志自动定期清理',open:cleanOpen,okText:'保存规则',cancelText:'取消',
      onOk:()=>{ msg.success(`已设置：保留 ${keepDays} 天，超期日志自动清理`); setCleanOpen(false); },onCancel:()=>setCleanOpen(false)},
      React.createElement(Alert,{type:'info',showIcon:true,style:{marginBottom:14},message:'系统按预设周期定时清理超出保留期限的各类日志，释放存储。'}),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
        React.createElement('span',null,'日志保留天数'),
        React.createElement(InputNumber,{min:1,max:365,value:keepDays,onChange:setKeepDays}),
        React.createElement('span',{style:{color:'#8c8c8c'}},'天（超期自动清理）'))
    )
  );
};
